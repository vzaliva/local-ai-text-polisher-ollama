<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Polisher Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <h1>AI Text Polisher Settings</h1>

    <form id="settings-form">
        <section class="settings-section">
            <h2>Ollama Configuration</h2>
            <div class="form-group">
                <label for="ollama-url">Ollama API URL:</label>
                <input type="url" id="ollama-url" placeholder="e.g., http://localhost:11434" required>
                <small>The base URL of your running Ollama instance.</small>
            </div>
            <div class="form-group">
                <label for="ollama-model">Ollama Model Name:</label>
                <input type="text" id="ollama-model" placeholder="e.g., llama3" required>
                <small>The name of the model to use (must be available in Ollama).</small>
            </div>
        </section>

        <section class="settings-section">
            <h2>Custom Prompts</h2>
            <p>Define the prompts that appear in the right-click menu. Use <code>{TEXT}</code> where the highlighted text should be inserted.</p>
            <div id="prompts-list">
                </div>
            <button type="button" id="add-prompt-btn">Add New Prompt</button>
        </section>

        <hr>

        <div class="form-actions">
            <button type="submit" id="save-btn">Save Settings</button>
            <p id="status-message" class="status-message"></p>
        </div>
    </form>

    <div id="prompt-template" class="prompt-entry" style="display: none;">
        <div class="form-group">
            <label>Menu Item Name:</label>
            <input type="text" class="prompt-name" placeholder="e.g., Make Formal" required>
        </div>
        <div class="form-group">
            <label>Prompt Template:</label>
            <textarea class="prompt-text" rows="3" placeholder="e.g., Rewrite the following text in a more formal tone:\n\n{TEXT}" required></textarea>
        </div>
        <button type="button" class="remove-prompt-btn">Remove</button>
    </div>

    <script src="options.js"></script>
</body>
</html>
